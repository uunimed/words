    async function fetchCSV(url) {
        try {
            const resp = await fetch(url);
            const text = await resp.text();
            const rows = text.trim().split(/\r?\n/);
            if (rows.length < 2) return [];
            const headers = rows[0].split(',').map(h => h.trim().replace(/^\uFEFF/, ''));
            const data = [];
            for (let i = 1; i < rows.length; i++) {
                const values = parseCSVRow(rows[i]);
                const obj = {};
                headers.forEach((h, idx) => { obj[h] = values[idx] || ""; });
                data.push(obj);
            }
            return data;
        } catch(e) { console.error(e); return []; }
    }
    function parseCSVRow(rowStr) {
        const regex = /(".*?"|[^,]*)(,|$)/g;
        let matches, values = [];
        while ((matches = regex.exec(rowStr)) !== null) {
            let val = matches[1];
            if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
            values.push(val);
            if (matches[2] === '') break;
        }
        return values;
    }

    function cleanGermanWord(word) {
        if (!word) return "";
        return word.replace(/^\d+\.\s*/, '').trim();
    }

async function speakText(text, lang = 'de-DE') {
    if (!text) return;
    
    // Cancel any ongoing speech
    window.speechSynthesis.cancel();
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang;
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    utterance.volume = 1;
    
    // Use user's preferred voice if set, otherwise get best male voice
    if (userPreferredVoice) {
        utterance.voice = userPreferredVoice;
    } else {
        const bestVoice = await getBestGermanVoice();
        if (bestVoice) {
            utterance.voice = bestVoice;
        }
    }
    
    window.speechSynthesis.speak(utterance);
}

async function speakFullDetails(item, moduleType) {
    if (!item) return;
    
    let textToSpeak = '';
    
    switch(moduleType) {
        case 'words':
            textToSpeak = `${item.german}. ქართული მნიშვნელობა: ${item.georgian}. Präteritum des Verbes: ${item.praeteritum || 'არ არის'}. Perfekt des Verbes: ${item.perfekt || 'არ არის'}. Hinweis: ${item.hinweis || 'არ არის'}`;
            break;
            
        case 'sentences':
            textToSpeak = `${item.german}. ქართული მნიშვნელობა: ${item.georgian}`;
            break;
            
        case 'trennbare':
            textToSpeak = `${item.prefix} ${item.verb}. ძირითადი მნიშვნელობა: ${item.definition}. სიტყვის ქართული თარგმანი: ${item.georgian}. სრული ზმნა: ${item.prefix}${item.verb}`;
            break;
            
        case 'verben_mit_praep':
            textToSpeak = `${item.verb}, პრეპოზიცია ${item.preposition}. მაგალითი: ${item.example || 'მაგალითი არ არის'}`;
            break;
            
        default:
            textToSpeak = item.german || item.verb || '';
    }
    
    // Cancel ongoing speech
    window.speechSynthesis.cancel();
    
    const utterance = new SpeechSynthesisUtterance(textToSpeak);
    utterance.lang = 'de-DE';
    utterance.rate = 0.85;
    utterance.pitch = 1.0;
    utterance.volume = 1;
    
    // Get the best available voice
    const bestVoice = await getBestGermanVoice();
    if (bestVoice) {
        utterance.voice = bestVoice;
    }
    
    window.speechSynthesis.speak(utterance);
}

// Function to get all available German voices
function getAvailableGermanVoices() {
    return new Promise((resolve) => {
        const loadVoices = () => {
            const voices = window.speechSynthesis.getVoices();
            const germanVoices = voices.filter(v => v.lang === 'de-DE' || v.lang.startsWith('de'));
            
            // Also include good male voices from other languages that work for German
            const otherMaleVoices = voices.filter(v => 
                (v.name.toLowerCase().includes('male') || 
                 v.name.toLowerCase().includes('david') ||
                 v.name.toLowerCase().includes('stefan')) &&
                (v.lang === 'en-US' || v.lang === 'en-GB')
            );
            
            const allVoices = [...germanVoices, ...otherMaleVoices];
            resolve(allVoices.length > 0 ? allVoices : voices);
        };
        
        if (window.speechSynthesis.getVoices().length > 0) {
            loadVoices();
        } else {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
    });
}

// Store user's voice preference
let userPreferredVoice = null;

// Function to set voice preference
async function setVoicePreference(voiceName) {
    const voices = await getAvailableGermanVoices();
    userPreferredVoice = voices.find(v => v.name === voiceName);
    if (userPreferredVoice) {
        localStorage.setItem('preferredVoiceName', voiceName);
        localStorage.setItem('preferredVoiceLang', userPreferredVoice.lang);
        showToast(`Voice changed to: ${userPreferredVoice.name}`);
    }
}

}

// Optional: Split long text into smaller chunks
async function speakWithPauses(text, chunkDelay = 200) {
    const sentences = text.split(/(?<=[.!?])\s+/);
    for (const sentence of sentences) {
        await speakText(sentence);
        await new Promise(resolve => setTimeout(resolve, chunkDelay));
    }
}

    function processWordsWithLevels(rawWords) {
        let items = [];
        let currentLevel = "A1";
        for (let i = 0; i < rawWords.length; i++) {
            const w = rawWords[i];
            let rawGerman = w["Das Wort"] || "";
            let rawGermanCleaned = cleanGermanWord(rawGerman);
            let lowerCheck = rawGermanCleaned.toLowerCase();
            if (lowerCheck.includes("niveau a1+")) { currentLevel = "A1"; continue; }
            if (lowerCheck.includes("niveau a2+")) { currentLevel = "A2"; continue; }
            if (lowerCheck.includes("niveau b1+")) { currentLevel = "B1"; continue; }
            if (rawGermanCleaned === "" || lowerCheck.startsWith("niveau")) continue;
            items.push({
                german: rawGermanCleaned,
                georgian: w["Georgische Übersetzung"] || "",
                praeteritum: w["Präteritum (3. Person)"] || "",
                perfekt: w["Perfekt (er/sie)"] || "",
                hinweis: w["Hinweis"] || "",
                level: currentLevel
            });
        }
        return items;
    }

    function processSentencesWithChapters(rawSentences) {
        let items = [];
        let currentLevel = "A1";
        let currentChapter = "Allgemein";
        for (let s of rawSentences) {
            let rawGerman = s["Deutsche Sätze"] || "";
            let cleanedGerman = cleanGermanWord(rawGerman);
            let lower = cleanedGerman.toLowerCase();
            if (lower.includes("niveau a1+")) { currentLevel = "A1"; continue; }
            if (lower.includes("niveau a2+")) { currentLevel = "A2"; continue; }
            if (lower.includes("niveau b1+")) { currentLevel = "B1"; continue; }
// Look for "Kap" or "KAP" followed by space, dot, or number - NOT "kap" inside words like "kaputt"
if (lower.match(/^(kap\.?\s*|niveau\s*kap\.?)/i) || lower.match(/\s(kap\.?\s*[ivxlcdm0-9]+)/i)) {
    let chapMatch = cleanedGerman.match(/kap\.?\s*([IVXLCDM0-9]+)/i);
    if (chapMatch) currentChapter = `KAP. ${chapMatch[1]}`;
    else currentChapter = cleanedGerman;
    continue;
}
            if (cleanedGerman === "") continue;
            items.push({
                german: cleanedGerman,
                georgian: s["Georgische Übersetzung"] || "",
                chapter: currentChapter,
                level: currentLevel
            });
        }
        return items;
    }

return false;
        });
        // Apply sorting if active
        if (sortState.column && sortState.direction) {
            data.sort((a, b) => {
                let valA = a[sortState.column] || '';
                let valB = b[sortState.column] || '';
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA < valB) return sortState.direction === 'asc' ? -1 : 1;

function getBestGermanVoice() {
    return new Promise((resolve) => {
        // Wait for voices to load
        const loadVoices = () => {
            const voices = window.speechSynthesis.getVoices();
            
            // Priority order for MALE German voices (most human-like first)
            const preferredMaleVoices = [
                'Google Deutsch männlich',  // Google's male German voice
                'Microsoft Stefan',         // Microsoft's male German voice
                'Stefan',                   // Male German voice
                'Google UK English Male',   // Male voice that works for German
                'Google US English Male',   // Alternative male voice
                'Microsoft David',          // Male voice
                'de-DE Male',               // Generic male German
                'de-DE'                     // Fallback to any German voice
            ];
            
            // First, try to find explicit male German voices
            for (const preferred of preferredMaleVoices) {
                const voice = voices.find(v => 
                    v.name.includes(preferred) || 
                    (v.lang === 'de-DE' && v.name.toLowerCase().includes('male')) ||
                    (v.lang.startsWith('de') && v.name.toLowerCase().includes('männlich'))
                );
                if (voice) {
                    console.log('Selected male voice:', voice.name);
                    resolve(voice);
                    return;
                }
            }
            
            // If no explicit male voice, find any male voice that supports German
            const maleGermanVoice = voices.find(v => 
                (v.lang === 'de-DE' || v.lang.startsWith('de')) && 
                (v.name.toLowerCase().includes('male') || 
                 v.name.toLowerCase().includes('männlich') ||
                 v.name.toLowerCase().includes('stefan') ||
                 v.name.toLowerCase().includes('david') ||
                 v.name.toLowerCase().includes('marcus'))
            );
            
            if (maleGermanVoice) {
                console.log('Found male voice:', maleGermanVoice.name);
                resolve(maleGermanVoice);
                return;
            }
            
            // Fallback: try to find any German voice (might be female)
            const germanVoice = voices.find(v => v.lang === 'de-DE' || v.lang.startsWith('de'));
            if (germanVoice) {
                console.warn('No male voice found, using:', germanVoice.name);
                resolve(germanVoice);
                return;
            }
            
            // Last resort: any voice
            console.warn('No German voice found, using default');
            resolve(voices[0]);
        };
        
        // Handle voice loading (sometimes takes a moment)
        if (window.speechSynthesis.getVoices().length > 0) {
            loadVoices();
        } else {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
    });
}

            tableHtml += `<tr class="word-row" data-type="trennbare" data-index="${index}" data-prefix="${escapeHtml(t.prefix)}" data-verb="${escapeHtml(t.verb)}"><td><strong>${escapeHtml(t.prefix)}</strong></td><td class="german-word">${escapeHtml(t.verb)}</td><td>${escapeHtml(t.definition)}</td><td>${escapeHtml(t.georgian)}</td></tr>`;
        });
        tableHtml += `</tbody></table></div>`;
} else if (mod === 'verben_mit_praep') {
    tableHtml = `<div class="table-wrapper"><table class="data-table"><thead><tr><th data-sort="verb">das Verb</th><th data-sort="preposition">Präposition</th><th data-sort="kasus">Kasus</th><th data-sort="translation">Übersetzung</th><th data-sort="example">Beispiel</th><th>Hören</th></tr></thead><tbody>`;
    filtered.forEach((v, index) => { 
        tableHtml += `<tr class="word-row" data-type="verben_mit_praep" data-index="${index}" data-verb="${escapeHtml(v.verb)}">`;
        tableHtml += `<td class="german-word">${escapeHtml(v.verb)}</td>`;
        tableHtml += `<td>${escapeHtml(v.preposition)}</td>`;
        tableHtml += `<td>${escapeHtml(v.kasus)}</td>`;
        tableHtml += `<td>${escapeHtml(v.translation)}</td>`;
        tableHtml += `<td><em>${escapeHtml(v.example)}</em></td>`;
        tableHtml += `<td><span class="audio-table-icon">${getAudioSVG()}</span></td>`;
        tableHtml += `</tr>`;
    });
    tableHtml += `</tbody></table></div>`;
}
    resultsContainer.innerHTML = tableHtml;
    
    // Attach sorting listeners
    document.querySelectorAll('.data-table th[data-sort]').forEach(th => {
        const sortKey = th.getAttribute('data-sort');
        th.addEventListener('click', (e) => { e.stopPropagation(); applySorting(sortKey, th); });
    });
    
document.querySelectorAll('.audio-table-icon').forEach((icon, idx) => {
    icon.addEventListener('click', (e) => { 
        e.stopPropagation(); 
        const row = icon.closest('tr');
        
        if (mod === 'words') {
            const germanText = row.getAttribute('data-german');
            const found = appState.moduleData.words.find(w => w.german === germanText);
            if (found) speakFullDetails(found, 'words');
        }
        else if (mod === 'sentences') {
            const germanText = row.getAttribute('data-german');
            const found = appState.moduleData.sentences.find(s => s.german === germanText);
            if (found) speakFullDetails(found, 'sentences');
        }
        else if (mod === 'trennbare') {
            const prefix = row.getAttribute('data-prefix');
            const verb = row.getAttribute('data-verb');
            const found = appState.moduleData.trennbare.find(t => t.prefix === prefix && t.verb === verb);
            if (found) speakFullDetails(found, 'trennbare');
        }
        else if (mod === 'verben_mit_praep') {
            const index = row.getAttribute('data-index');
            if (index !== null && appState.moduleData.verben_mit_praep[index]) {
                speakFullDetails(appState.moduleData.verben_mit_praep[index], 'verben_mit_praep');
            }
        }
    });
});
    
document.querySelectorAll('.word-row').forEach(row => {
    row.addEventListener('click', (e) => { 
        if(e.target.closest('.audio-table-icon')) return; 
        const type = row.getAttribute('data-type'); 
        if (type === 'words') { 
            const germanText = row.getAttribute('data-german'); 
            const found = appState.moduleData.words.find(w => w.german === germanText); 
            if(found) openModal(found, 'words'); 
        } else if (type === 'sentences') { 
            const germanText = row.getAttribute('data-german'); 
            const found = appState.moduleData.sentences.find(s => s.german === germanText); 
            if(found) openModal(found, 'sentences'); 
        } else if (type === 'trennbare') { 
            const prefix = row.getAttribute('data-prefix');
            const verb = row.getAttribute('data-verb');
            const found = appState.moduleData.trennbare.find(t => t.prefix === prefix && t.verb === verb); 
            if(found) openModal(found, 'trennbare'); 
        } else if (type === 'verben_mit_praep') { 
            // Use a unique identifier - store the index
            const index = row.getAttribute('data-index');
            if (index !== null && appState.moduleData.verben_mit_praep[index]) {
                openModal(appState.moduleData.verben_mit_praep[index], 'verben_mit_praep');
            }
        }
    });
});
}

    function renderModuleView() {
        const mod = appState.activeModule;
        const titles = { words: 'Wörter', sentences: 'Sätze', trennbare: 'Trennbare Verben', verben_mit_praep: 'Verben mit Präp.' };
        const container = document.createElement('div'); container.className = 'glass-card'; container.style.padding = '1.2rem 1rem';
        container.innerHTML = `<div class="header-flex"><div class="title-row"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="1.5"><path d="M4 7h16M4 12h16M4 17h10"/><rect x="2" y="3" width="20" height="18" rx="2"/></svg><h2 style="font-weight:800;">${titles[mod]}</h2></div><div style="display:flex; gap:10px;"><button class="print-btn" id="printListBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 9V3h12v6M6 21h12v-6H6zM21 9H3v8h4V9h14v8h4V9z"/></svg> ბეჭდვა</button><button class="signout-btn" id="signoutBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l4-4-4-4M12 12h8"/></svg> გასვლა</button><button class="back-btn" id="backBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> ყველა მოდული</button></div></div><div class="search-area"><input type="text" id="searchInput" class="search-input" placeholder="ძებნა..."></div><div class="results-container" id="resultsContainer"><div class="empty-state">ჩაწერეთ სიტყვა</div></div>`;
        return container;
    }
    
    function attachModuleEvents(container) {
        const searchInput = container.querySelector('#searchInput');
        if (searchInput) { searchInput.value = appState.searchTerm; searchInput.addEventListener('input', (e) => { appState.searchTerm = e.target.value; sortState.column = null; sortState.direction = null; updateResultsOnly(); }); }
        container.querySelector('#backBtn')?.addEventListener('click', () => { appState.activeModule = null; appState.searchTerm = ""; sortState = { column: null, direction: null }; renderApp(); });
        container.querySelector('#signoutBtn')?.addEventListener('click', () => { appState.authenticated = false; appState.activeModule = null; appState.searchTerm = ""; renderApp(); });
        container.querySelector('#printListBtn')?.addEventListener('click', () => printCurrentModule());
        if (appState.searchTerm !== "") updateResultsOnly(); else updateResultsOnly();
    }

async function showVoiceSelector() {
    const voices = await getAvailableGermanVoices();
    
    // Separate male and female voices
    const maleVoices = voices.filter(v => 
        v.name.toLowerCase().includes('male') || 
        v.name.toLowerCase().includes('männlich') ||
        v.name.toLowerCase().includes('stefan') ||
        v.name.toLowerCase().includes('david') ||
        v.name.toLowerCase().includes('marcus') ||
        v.name.toLowerCase().includes('google')
    );
    
    const femaleVoices = voices.filter(v => 
        v.name.toLowerCase().includes('female') || 
        v.name.toLowerCase().includes('weiblich') ||
        v.name.toLowerCase().includes('samantha') ||
        (!maleVoices.includes(v))
    );
    
    let modalHtml = `<div class="modal-overlay"><div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h3>Choose Voice / აირჩიეთ ხმა</h3>
            <button class="close-modal" style="width: auto;">Close</button>
        </div>
        <div style="margin-bottom: 1rem;">
            <h4>Male Voices / მამრობითი ხმები:</h4>
            ${maleVoices.map(v => `<button class="voice-option" data-voice="${v.name}" style="margin: 5px; padding: 8px 16px; width: auto; background: ${userPreferredVoice?.name === v.name ? '#4f46e5' : '#64748b'}">${v.name} (${v.lang})</button>`).join('')}
            ${maleVoices.length === 0 ? '<p>No male voices found / მამრობითი ხმები ვერ მოიძებნა</p>' : ''}
        </div>
        <div>
            <h4>Female Voices / მდედრობითი ხმები:</h4>
            ${femaleVoices.map(v => `<button class="voice-option" data-voice="${v.name}" style="margin: 5px; padding: 8px 16px; width: auto; background: #94a3b8;">${v.name} (${v.lang})</button>`).join('')}
        </div>
    </div></div>`;
    
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    const modal = document.querySelector('.modal-overlay');
    
    modal.querySelectorAll('.voice-option').forEach(btn => {
        btn.addEventListener('click', async () => {
            const voiceName = btn.getAttribute('data-voice');
            await setVoicePreference(voiceName);
            modal.remove();
            // Test the new voice
            speakText("Hallo, das ist meine neue Stimme", 'de-DE');
        });
    });
    
    modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
}

function attachDashboardEvents(container) {
    container.querySelector('#signoutDashboard')?.addEventListener('click', () => { appState.authenticated = false; renderApp(); });
    
    container.querySelector('#refreshTitle')?.addEventListener('click', async () => { 
        setLoading(true);
        await loadAllData();
        renderApp();
    });
    
    container.querySelector('#voiceSelectorBtn')?.addEventListener('click', showVoiceSelector);
    
    container.querySelectorAll('.module-card').forEach(card => { 
        card.addEventListener('click', () => { 
            const mod = card.getAttribute('data-module'); 
            if (mod) { 
                appState.activeModule = mod; 
                appState.searchTerm = ""; 
                sortState = { column: null, direction: null }; 
                renderApp(); 
            } 
        }); 
    });
}

    function renderLogin() {
        const container = document.createElement('div'); container.className = 'glass-card login-panel';
        container.innerHTML = `<div><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/><circle cx="12" cy="12" r="3"/></svg></div><h2 style="margin:1rem 0;">ShogiLang</h2><input type="text" id="loginUser" placeholder="მომხმარებელი"><input type="password" id="loginPass" placeholder="პაროლი"><button id="loginBtn">შესვლა</button>`;
        return container;
    }
    
    function attachLoginEvents(container) {
        container.querySelector('#loginBtn')?.addEventListener('click', async () => {
            const user = container.querySelector('#loginUser').value.trim();
            const pass = container.querySelector('#loginPass').value.trim();
            if (user === 'alex' && pass === '2911') { appState.authenticated = true; await loadAllData(); renderApp(); } 
            else showToast('მომხმარებელი ან პაროლი არასწორია');
        });
    }

    async function renderApp() {
        const root = document.getElementById('app'); root.innerHTML = '';
        if (!appState.authenticated) { const loginDiv = renderLogin(); root.appendChild(loginDiv); attachLoginEvents(loginDiv); }
        else if (!appState.activeModule) { const dashboard = renderModulesDashboard(); root.appendChild(dashboard); attachDashboardEvents(dashboard); }
        else { const moduleView = renderModuleView(); root.appendChild(moduleView); attachModuleEvents(moduleView); }
    }
    renderApp();
</script>
